let myLat=null,myLon=null;
function haversine(a,b,c,d){const R=6371,dLat=(c-a)*Math.PI/180,dLon=(d-b)*Math.PI/180,x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;return 2*R*Math.asin(Math.sqrt(x))}
function setStatus(m,ok){const e=document.getElementById('status');e.className=ok?'ok':'';e.textContent=m}
function setError(m){const e=document.getElementById('errorBox');e.style.display=m?'block':'none';e.textContent=m||''}
function onSortChange(){
  const opt=document.getElementById('optParams');
  opt.className=document.getElementById('sortMode').value==='optimal'?'opt-params visible':'opt-params';
  render();
}
async function getMyLocation(){
  setError('');const b=document.querySelector('.btn-loc');
  if(!navigator.geolocation){setError('geolocation 미지원 브라우저');return}
  b.textContent='📍 위치 확인 중...';b.classList.add('active');
  navigator.geolocation.getCurrentPosition(p=>{
    myLat=p.coords.latitude;myLon=p.coords.longitude;
    setStatus('📍 '+myLat.toFixed(5)+', '+myLon.toFixed(5),true);
    b.textContent='📍 위치 확보됨';render();
  },err=>{
    let m='위치 조회 실패\n';
    if(err.code===1)m+='권한 거부됨\nChrome 설정 > 권한 > 위치 허용';
    else if(err.code===2)m+='위치를 찾지 못함\nGPS 켜거나 창가에서 재시도';
    else if(err.code===3)m+='시간 초과\n네트워크 상태 확인';
    else m+='알 수 없는 오류';
    setError(m);b.textContent='📍 다시 시도';b.classList.remove('active');
  },{enableHighAccuracy:true,timeout:12000,maximumAge:60000})
}
function navLinks(r){
  const lat=Number(r.latitude),lon=Number(r.longitude),n=r.station_name;
  const naver='nmap://search?query='+encodeURIComponent(n)+'&lat='+lat+'&lng='+lon+'&appname=gasfinder';
  const naverF='https://map.naver.com/p/search/'+encodeURIComponent(n);
  const kakao='https://map.kakao.com/link/to/'+encodeURIComponent(n)+','+lat+','+lon;
  const tmap='tmap://route?goalname='+encodeURIComponent(n)+'&goalx='+lon+'&goaly='+lat;
  const tmapF='https://apis.openapi.sk.com/tmap/app/route?goalX='+lon+'&goalY='+lat+'&goalName='+encodeURIComponent(n);
  const gmap='https://www.google.com/maps/search/?api=1&query='+lat+','+lon+'('+encodeURIComponent(n)+')';
  const geo='geo:0,0?q='+lat+','+lon+'('+encodeURIComponent(n)+')';
  return '<div class="navlinks"><a href="'+tmap+'" onclick="event.preventDefault();openApp(this.href,\''+tmapF+'\')">티맵</a><a href="'+naver+'" onclick="event.preventDefault();openApp(this.href,\''+naverF+'\')">네이버지도</a><a href="'+kakao+'" target="_blank">카카오맵</a><a href="'+gmap+'" target="_blank">구글맵</a><a href="'+geo+'">기타지도앱</a></div>';
}
function openApp(dl,fb){var t=Date.now();window.location.href=dl;setTimeout(function(){if(Date.now()-t<2000)window.open(fb,'_blank')},500)}
function render(){
  const sm=document.getElementById('sortMode').value,cf=document.getElementById('currencyFilter').value;
  const eff=parseFloat(document.getElementById('efficiency').value)||12;
  const budget=parseFloat(document.getElementById('budget').value)||50000;
  let items=rows.map(r=>({...r}));
  items.forEach(r=>r.distanceKm=(myLat!=null&&myLon!=null)?haversine(myLat,myLon,Number(r.latitude),Number(r.longitude)):null);
  if(cf!=='all')items=items.filter(r=>r.currency===cf);
  // Calculate net gain for optimal sort
  items.forEach(r=>{
    if(r.price_num && r.distanceKm!=null){
      const roundTrip=r.distanceKm*2;
      const fuelUsed=roundTrip/eff;
      const tripCost=fuelUsed*r.price_num;
      const buyableL=Math.max(0,(budget-tripCost)/r.price_num);
      r.netGain=buyableL-fuelUsed;
      r.buyableL=buyableL;
      r.tripCost=tripCost;
    }else{
      r.netGain=null;r.buyableL=null;r.tripCost=null;
    }
  });
  if(sm==='distance')items.sort((a,b)=>(a.distanceKm??1e9)-(b.distanceKm??1e9)||((a.price_num??1e9)-(b.price_num??1e9)));
  else if(sm==='price')items.sort((a,b)=>(a.price_num??1e9)-(b.price_num??1e9)||((a.distanceKm??1e9)-(b.distanceKm??1e9)));
  else items.sort((a,b)=>(b.netGain??-1e9)-(a.netGain??-1e9));
  if(!items.length){document.getElementById('list').innerHTML='<div class="empty-msg">결과가 없어</div>';return}
  document.getElementById('list').innerHTML=items.map((r,i)=>{
    const badge=r.currency==='여민전'?'badge-yeomin':'badge-cheongju';
    const pclass=r.gasoline_price_today?'price':'price empty';
    const ptext=r.gasoline_price_today||'가격 미확인';
    const dist=r.distanceKm!=null?r.distanceKm.toFixed(1)+'km':'—';
    const rank=i<3?'rank top3':'rank';
    let netInfo='';
    if(sm==='optimal' && r.price_num && r.distanceKm!=null){
      const netL=r.netGain.toFixed(2);
      const cls=r.netGain>=0?'net-gain':'net-gain negative';
      netInfo='<div class="'+cls+'">순수획득 '+netL+'L (왕복 '+r.tripCost.toFixed(0)+'원 사용)</div>';
    }
    return '<div class="card"><div class="card-top"><span class="'+rank+'">'+(i+1)+'</span><span class="card-name">'+r.station_name+'</span><span class="badge '+badge+'">'+r.currency+'</span></div><div class="'+pclass+'">'+ptext+'</div><div class="card-meta">거리 <b>'+dist+'</b> · '+r.address+' · '+(r.phone||'-')+'</div>'+netInfo+navLinks(r)+'</div>';
  }).join('');
}
render();
